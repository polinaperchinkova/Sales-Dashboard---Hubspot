<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sales Pipeline Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:'Open Sans',sans-serif;}
    body{background:#f0f2f5;min-height:100vh;color:#0f172a;}
    .wrap{max-width:1400px;margin:0 auto;padding:20px 24px;}
    h1{font-size:26px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:#1a1a1a;}
    .sub{font-size:13px;color:#64748b;margin-top:3px;}
    .tabs{display:flex;gap:8px;margin:14px 0;flex-wrap:wrap;}
    .tab{cursor:pointer;padding:7px 18px;border-radius:20px;font-size:12px;font-weight:700;border:1.5px solid #e2e8f0;background:#fff;color:#64748b;text-transform:uppercase;transition:all .15s;}
    .tab:hover{border-color:#c0392b;color:#c0392b;}
    .tab.active{background:#c0392b;color:#fff;border-color:#c0392b;}
    .card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.05);}
    .lbl{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px;}
    .val{font-size:26px;font-weight:800;line-height:1.1;color:#0f172a;}
    .sval{font-size:12px;color:#94a3b8;margin-top:3px;}
    .g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px;}
    .g3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px;}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
    .g21{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:14px;}
    .cred{background:linear-gradient(135deg,#c0604a,#d4705a);border:none;color:#fff;margin-bottom:14px;}
    .badge{font-size:11px;font-weight:700;padding:2px 7px;border-radius:6px;margin-left:5px;}
    .up{background:rgba(74,222,128,.12);color:#16a34a;}
    .dn{background:rgba(248,113,113,.12);color:#dc2626;}
    .prow{display:flex;align-items:center;gap:8px;margin-bottom:7px;}
    .plbl{font-size:12px;color:#64748b;width:95px;flex-shrink:0;}
    .pbg{flex:1;background:#f1f5f9;border-radius:3px;height:7px;overflow:hidden;}
    .pbar{height:100%;border-radius:3px;background:#c0392b;}
    .pval{font-size:11px;font-weight:700;color:#0f172a;width:75px;text-align:right;flex-shrink:0;}
    .stitle{font-size:11px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
    .wlbl{font-size:10px;text-transform:uppercase;letter-spacing:1px;opacity:.55;color:#fff;}
    .wbig{font-size:36px;font-weight:800;line-height:1;color:#fff;}
    .wring{position:relative;display:inline-block;}
    .wrtxt{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;color:#fff;}
    .fnote{font-size:11px;color:#94a3b8;text-align:right;margin-top:8px;}
    .view{display:none;}
    .view.active{display:block;}
    .frow{display:flex;gap:20px;margin-top:8px;}
    .fitem{flex:1;}
    .fnum{font-size:30px;font-weight:800;line-height:1.1;}
    .fbw{margin-top:6px;height:5px;border-radius:3px;background:#f1f5f9;overflow:hidden;}
    .fb{height:100%;border-radius:3px;}
    @media(max-width:800px){
      .g4,.g3{grid-template-columns:repeat(2,1fr);}
      .g2,.g21{grid-template-columns:1fr;}
      .wrap{padding:12px;}
    }
  </style>
</head>

const CY=2026,PY=2025;
const PIPE_STAGES=["495","496","497","690","691"];
const SL={"495":"Introductory","496":"Prospect","497":"Qualified","690":"Opportunity"};
const MONTHS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

function fmt(n){if(n>=1e6)return(n/1e6).toFixed(3)+"M\u20ac";if(n>=1e3)return(n/1e3).toFixed(0)+"K\u20ac";return n+"\u20ac";}
function pd(a,b){if(b===0)return a>0?"+\u221e%":"\u2014";const p=((a-b)/b)*100;return(p>=0?"+":"")+p.toFixed(0)+"%";}
function bdg(a,b){const c=a>=b?"up":"dn";return`<span class="badge ${c}">${pd(a,b)}</span>`;}

function filter(period){
  return ALL_DEALS.filter(d=>{
    const rd=new Date((d.won||d.lost)?d.closedate:d.createdate);
    const y=rd.getFullYear(),mo=rd.getMonth();
    if(period==="MTD")return y===CY&&mo===2&&rd<=new Date("2026-03-05");
    if(period==="YTD")return y===CY&&rd<=new Date("2026-03-05");
    if(period==="CUR")return y===CY;
    if(period==="PREV")return y===PY;
    return true;
  });
}

function metrics(deals){
  const pipe=deals.filter(d=>PIPE_STAGES.includes(d.stage));
  const won=deals.filter(d=>d.won),lost=deals.filter(d=>d.lost);
  const pv=pipe.reduce((s,d)=>s+d.amt,0);
  const wt=pipe.reduce((s,d)=>s+d.amt*d.prob,0);
  const wa=won.reduce((s,d)=>s+d.amt,0);
  const la=lost.reduce((s,d)=>s+d.amt,0);
  const tot=won.length+lost.length;
  const wr=tot>0?(won.length/tot)*100:0;
  const avg=won.length>0?wa/won.length:0;
  const sa={},sc={};
  ["495","496","497","690"].forEach(s=>{sa[s]=0;sc[s]=0;});
  pipe.forEach(d=>{if(sa[d.stage]!==undefined){sa[d.stage]+=d.amt;sc[d.stage]++;}});
  const cd=["495","496","497","690"].map(s=>({name:SL[s],v:sa[s]||0,c:sc[s]||0}));
  return{pv,wt,tip:pipe.length,won:won.length,lost:lost.length,wa,la,wr,avg,cd};
}

function mwon(yr){
  const b=Array(12).fill(0);
  ALL_DEALS.filter(d=>d.won&&new Date(d.closedate).getFullYear()===yr).forEach(d=>{b[new Date(d.closedate).getMonth()]+=d.amt;});
  return b;
}

const ch={};
function dc(id){if(ch[id]){ch[id].destroy();delete ch[id];}}

function barChart(id,labels,data,color){
  dc(id);const c=document.getElementById(id);if(!c)return;
  ch[id]=new Chart(c,{type:'bar',data:{labels,datasets:[{data,backgroundColor:color,borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{grid:{display:false},ticks:{color:'#94a3b8',font:{size:11}}},
              y:{grid:{color:'#f1f5f9'},ticks:{color:'#94a3b8',font:{size:11},callback:v=>v>=1000?(v/1000)+'K':v}}}}});
}

function lineChart(id,labels,datasets){
  dc(id);const c=document.getElementById(id);if(!c)return;
  ch[id]=new Chart(c,{type:'line',data:{labels,datasets},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{labels:{color:'#64748b',font:{size:12}}}},
      scales:{x:{grid:{display:false},ticks:{color:'#94a3b8',font:{size:11}}},
              y:{grid:{color:'#f1f5f9'},ticks:{color:'#94a3b8',font:{size:11},callback:v=>v>=1000?(v/1000)+'K':v}}}}});
}

function kpi(lbl,val,sub){return`<div class="card"><div class="lbl">${lbl}</div><div class="val">${val}</div>${sub?`<div class="sval">${sub}</div>`:''}</div>`;}

function pipes(cd){
  const mx=Math.max(...cd.map(d=>d.v),1);
  return cd.map(d=>`<div class="prow"><div class="plbl">${d.name}</div><div class="pbg"><div class="pbar" style="width:${Math.round(d.v/mx*100)}%"></div></div><div class="pval">${fmt(d.v)}</div></div>`).join('');
}

function ring(ratio,sz=80){
  const st=8,r=(sz-st)/2,ci=2*Math.PI*r,da=(ratio/100)*ci;
  return`<svg width="${sz}" height="${sz}" style="transform:rotate(-90deg)"><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="${st}"/><circle cx="${sz/2}" cy="${sz/2}" r="${r}" fill="none" stroke="#fff" stroke-width="${st}" stroke-dasharray="${da} ${ci-da}" stroke-linecap="round"/></svg>`;
}

function winBox(m,mp,note){
  return`<div class="card cred" style="padding:16px 20px">
    <div style="display:flex;align-items:center;gap:20px;flex-wrap:wrap">
      <div><div class="wlbl">Win vs Lost</div><div class="wbig">${m.won}<span style="opacity:.35">/${m.won+m.lost}</span></div>${mp?`<div style="font-size:12px;color:rgba(255,255,255,.65);margin-top:2px">${PY}: ${mp.won}/${mp.won+mp.lost} ${bdg(m.won,mp.won)}</div>`:''}</div>
      <div style="width:1px;height:55px;background:rgba(255,255,255,.2)"></div>
      <div><div class="wlbl">Won / Lost Amount</div><div style="font-size:22px;font-weight:800;color:#fff">${(m.wa/1e6).toFixed(3)}<span style="opacity:.35">/${(m.la/1e6).toFixed(3)} M\u20ac</span></div><div style="margin-top:6px;height:4px;border-radius:3px;background:rgba(255,255,255,.2);overflow:hidden;width:180px"><div style="height:100%;border-radius:3px;width:${m.wa/(m.wa+m.la||1)*100}%;background:#fff"></div></div>${mp?`<div style="font-size:12px;color:rgba(255,255,255,.65);margin-top:3px">${PY}: ${(mp.wa/1e6).toFixed(3)}M\u20ac ${bdg(m.wa,mp.wa)}</div>`:''}</div>
      <div style="flex:1"></div>
      <div style="text-align:center"><div class="wlbl" style="margin-bottom:5px">Win Ratio</div><div class="wring">${ring(m.wr)}<div class="wrtxt">${m.wr.toFixed(1)}%</div></div></div>
    </div>
  </div>
  <div class="fnote">${note}</div>`;
}

      {label:"Won",data:wn,backgroundColor:"#22c55e",borderRadius:4},
      {label:"Lost",data:ls,backgroundColor:"#ef4444",borderRadius:4}
    ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#64748b',font:{size:12}}}},scales:{x:{grid:{display:false},ticks:{color:'#94a3b8'}},y:{grid:{color:'#f1f5f9'},ticks:{color:'#94a3b8',stepSize:1}}}}});
  },50);
}

const renderers={mtd:renderMTD,ytd:renderYTD,yoy:renderYOY,all:renderALL,act:renderACT};
const done={};
function switchTab(name,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('view-'+name).classList.add('active');
  if(!done[name]){renderers[name]();done[name]=true;}
}
renderMTD();done['mtd']=true;
</script>
</body>
